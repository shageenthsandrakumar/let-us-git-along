<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FounderFit — Behavioral Assessment</title>
<style>
  :root{--bg:#08080f;--surface:#0f0f1a;--card:#13131f;--border:#1e1e30;--primary:#6366f1;--purple:#a855f7;--text:#e2e8f0;--muted:#64748b;--success:#22c55e}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  a{text-decoration:none;color:inherit}
  nav{padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border)}
  .logo{font-weight:800;font-size:1.2rem;background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .nav-back{color:var(--muted);font-size:.875rem;transition:color .2s}
  .nav-back:hover{color:var(--text)}
  .main{max-width:700px;margin:0 auto;padding:3rem 2rem}
  /* PROGRESS BAR */
  .prog-bar-wrap{margin-bottom:2.5rem}
  .prog-info{display:flex;justify-content:space-between;margin-bottom:.625rem;font-size:.8rem;color:var(--muted)}
  .prog-track{height:4px;background:var(--border);border-radius:9999px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--primary),var(--purple));border-radius:9999px;transition:width .4s ease}
  /* QUESTION */
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:2.5rem;margin-bottom:1.5rem;transition:opacity .3s}
  .q-num{font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--primary);margin-bottom:.875rem}
  .q-text{font-size:1.15rem;font-weight:700;line-height:1.5;margin-bottom:1.75rem}
  .options{display:flex;flex-direction:column;gap:.625rem}
  .opt{display:flex;align-items:flex-start;gap:1rem;padding:1rem 1.25rem;border:1.5px solid var(--border);border-radius:.75rem;cursor:pointer;transition:all .2s;position:relative}
  .opt:hover{border-color:rgba(99,102,241,.5);background:rgba(99,102,241,.04)}
  .opt.selected{border-color:var(--primary);background:rgba(99,102,241,.1)}
  .opt input{position:absolute;opacity:0;width:0;height:0}
  .opt-radio{width:20px;height:20px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:.1rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
  .opt.selected .opt-radio{border-color:var(--primary);background:var(--primary)}
  .opt.selected .opt-radio::after{content:'';width:7px;height:7px;border-radius:50%;background:#fff;display:block}
  .opt-body h4{font-size:.92rem;font-weight:600;margin-bottom:.2rem}
  .opt-body p{font-size:.8rem;color:var(--muted);line-height:1.5}
  /* NAV BUTTONS */
  .q-actions{display:flex;gap:.75rem;margin-top:1.5rem}
  .btn-prev{padding:.875rem 1.5rem;border:1px solid var(--border);background:none;color:var(--muted);border-radius:.625rem;font-size:.9rem;cursor:pointer;transition:all .2s;font-family:inherit}
  .btn-prev:hover{border-color:var(--primary);color:var(--text)}
  .btn-next-q{flex:1;padding:.875rem;background:var(--primary);color:#fff;border:none;border-radius:.625rem;font-size:.95rem;font-weight:700;cursor:pointer;transition:background .2s;font-family:inherit}
  .btn-next-q:hover{background:#4f46e5}
  .btn-next-q:disabled{opacity:.4;cursor:not-allowed}
  /* RESULTS */
  #results{display:none}
  .results-hero{text-align:center;padding:2rem 0 3rem}
  .score-ring{width:140px;height:140px;margin:0 auto 1.5rem;position:relative}
  .score-ring svg{transform:rotate(-90deg)}
  .score-ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-ring-num span:first-child{font-size:2.25rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .score-ring-num span:last-child{font-size:.7rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .archetype-pill{display:inline-block;padding:.5rem 1.25rem;background:rgba(99,102,241,.15);border:1px solid rgba(99,102,241,.3);border-radius:9999px;font-weight:700;font-size:.9rem;color:#a5b4fc;margin-bottom:1rem}
  .results-hero h2{font-size:1.75rem;font-weight:800;margin-bottom:.75rem}
  .results-hero p{color:var(--muted);max-width:480px;margin:0 auto;line-height:1.7}
  .results-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem;margin-bottom:1.5rem}
  @media(max-width:560px){.results-grid{grid-template-columns:1fr}}
  .result-card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem}
  .result-card h3{font-size:.8rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:1.25rem}
  .dim-row{display:flex;align-items:center;gap:.875rem;margin-bottom:.875rem}
  .dim-row:last-child{margin-bottom:0}
  .dim-row-label{font-size:.8rem;color:var(--muted);width:130px;flex-shrink:0}
  .dim-track{flex:1;height:6px;background:var(--border);border-radius:9999px;overflow:hidden}
  .dim-fill{height:100%;border-radius:9999px;background:linear-gradient(90deg,var(--primary),var(--purple));transition:width .8s ease}
  .dim-score{font-size:.8rem;font-weight:700;width:28px;text-align:right}
  .strengths-list{list-style:none}
  .strengths-list li{font-size:.85rem;color:var(--muted);padding:.5rem 0;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;gap:.5rem;line-height:1.5}
  .strengths-list li:last-child{border-bottom:none}
  .strengths-list li::before{content:'→';color:var(--primary);flex-shrink:0}
  .result-actions{display:flex;gap:.75rem;margin-top:1.5rem}
  .btn-dash{flex:1;padding:.875rem;background:var(--primary);color:#fff;border:none;border-radius:.625rem;font-size:.95rem;font-weight:700;cursor:pointer;font-family:inherit;transition:background .2s}
  .btn-dash:hover{background:#4f46e5}
  .btn-retry{padding:.875rem 1.5rem;border:1px solid var(--border);color:var(--muted);background:none;border-radius:.625rem;font-size:.9rem;cursor:pointer;font-family:inherit;transition:all .2s}
  .btn-retry:hover{border-color:var(--primary);color:var(--text)}
  .loading{text-align:center;padding:4rem 2rem;display:none}
  .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading p{color:var(--muted)}
  .loading h3{margin-bottom:.5rem}
</style>
</head>
<body>
<nav>
  <div class="logo">FounderFit</div>
  <a href="/onboarding.html" class="nav-back">← Back to profile</a>
</nav>

<div class="main">
  <div id="quiz-section">
    <div class="prog-bar-wrap">
      <div class="prog-info"><span id="q-counter">Question 1 of 8</span><span id="q-pct">12%</span></div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:12%"></div></div>
    </div>

    <div class="q-card" id="q-card">
      <div class="q-num" id="q-num">Question 1</div>
      <div class="q-text" id="q-text"></div>
      <div class="options" id="q-options"></div>
    </div>

    <div class="q-actions">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()" style="display:none">← Previous</button>
      <button class="btn-next-q" id="btn-next" onclick="nextQ()" disabled>Next →</button>
    </div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <h3>Analyzing your profile...</h3>
    <p>Our AI is classifying your founder archetype</p>
  </div>

  <div id="results"></div>
</div>

<script>
const questions=[
  {id:'decision_speed',text:'You have 48 hours to make a major product decision with incomplete data. What do you do?',opts:[
    {val:'fast',h:'Ship an experiment',p:'Launch something scrappy, measure it, then decide based on real signal.'},
    {val:'moderate',h:'Gather a bit more context',p:'Talk to a few users, check the data, then move with moderate confidence.'},
    {val:'deliberate',h:'Take time to think it through',p:'Map out the scenarios, sleep on it, make a considered call.'}
  ]},
  {id:'risk_tolerance',text:'Your co-founder wants to take on a high-risk bet that could 10x or kill the company. You:',opts:[
    {val:'high',h:"Let's go",p:'Asymmetric upside is the whole point. You calculate the bet and commit.'},
    {val:'moderate',h:'Run a smaller experiment first',p:'Validate the thesis cheaply before going all-in.'},
    {val:'low',h:'Push back hard',p:"This isn't the right risk profile. You'd rather find a safer path forward."}
  ]},
  {id:'communication_style',text:'Your preferred working relationship with a co-founder looks like:',opts:[
    {val:'async',h:'Async-first',p:'Slack, Notion, PRs. You communicate in writing and hate interruptions.'},
    {val:'balanced',h:'Situational',p:'Async for routine updates, sync for hard decisions and alignment.'},
    {val:'sync',h:'High-touch sync',p:'Daily check-ins, shared workspace, real-time collaboration.'}
  ]},
  {id:'execution_style',text:'How do you naturally operate across a quarter?',opts:[
    {val:'sprint',h:'Intense sprint cycles',p:'2-week all-out bursts followed by consolidation. You live in peaks.'},
    {val:'steady',h:'Consistent daily output',p:'Same pace every day. No heroics, no crashes. Just execution.'},
    {val:'flexible',h:'Adaptive',p:'Matches the season — furious when needed, measured when not.'}
  ]},
  {id:'conflict_approach',text:'You and your co-founder have a genuine disagreement on company direction. You:',opts:[
    {val:'competing',h:'Push your case',p:'Back your conviction with evidence and argue it out until one of you wins.'},
    {val:'collaborative',h:'Debate until you find the best answer',p:"Treat it as a problem to solve together, not a battle to win."},
    {val:'compromising',h:'Find the middle ground fast',p:'A good-enough answer now beats a perfect answer in three weeks.'}
  ]},
  {id:'leadership_style',text:'When your team hits a roadblock, you naturally:',opts:[
    {val:'directive',h:'Step in and direct',p:'Clear the path, assign the fix, get things moving again immediately.'},
    {val:'coaching',h:'Coach toward the solution',p:'Ask the right questions so the team solves it themselves.'},
    {val:'delegating',h:'Delegate fully',p:'Hand it to whoever owns it and trust them to figure it out.'}
  ]},
  {id:'ambition_level',text:'Honest answer: what does success look like for you?',opts:[
    {val:'high',h:'Generational company',p:"$1B+ outcome or bust. You're swinging for something that changes an industry."},
    {val:'moderate',h:'Meaningful exit',p:'$10-100M outcome that rewards the team and lets you do it again.'},
    {val:'lifestyle',h:'Profitable and sustainable',p:'A great business that funds the life you want. Optionality over scale.'}
  ]},
  {id:'time_commitment',text:'How are you approaching the next 18 months?',opts:[
    {val:'full_time',h:'Full-time, all-in',p:"You've quit or are quitting. This is the only thing."},
    {val:'transitioning',h:'Transitioning in',p:"Still employed but actively winding down. Committed within 90 days."},
    {val:'part_time',h:'Part-time for now',p:'Building on evenings and weekends until it can support you.'}
  ]}
];

let current=0;
const answers={};
const archetypes={
  rapid_builder:{name:'Rapid Builder',emoji:'🚀',desc:'You ship fast, iterate aggressively, and treat tech debt as fuel. Your superpower is momentum — the ability to get something in users\'s hands before others have finished planning. You thrive in ambiguity and find slow decision-making physically painful.'},
  systems_operator:{name:'Systems Operator',emoji:'🏗️',desc:'You build infrastructure others stand on. Methodical, scalability-focused, and reliability-obsessed — you\'re the founder who\'s thinking about how this works at 10M users before you have 100. Your superpower is designing machines that outlast you.'},
  experimental_hacker:{name:'Experimental Hacker',emoji:'🔬',desc:'You explore widely, prototype fast, and hold low attachment to any single approach. Your superpower is the ability to kill ideas quickly and find signal in noise. You thrive in research-heavy, uncertainty-rich environments.'},
  vision_architect:{name:'Vision Architect',emoji:'🗺️',desc:'You see ten moves ahead and design backward. Documentation-heavy, strategic, and long-horizon — your superpower is building shared understanding across a team. You\'re at your best in platform companies where the architecture *is* the moat.'},
  product_strategist:{name:'Product Strategist',emoji:'📦',desc:'You\'re obsessed with the customer and make pragmatic trade-offs to deliver value fast. Feature-driven and outcome-focused, your superpower is knowing which 20% of features drive 80% of adoption — and ruthlessly cutting the rest.'},
  growth_hunter:{name:'Growth Hunter',emoji:'📈',desc:'You run experiments on everything and double down on what moves the number. Metrics-obsessed and conversion-focused, your superpower is building compounding loops — each win makes the next win cheaper.'}
};

function classify(ans){
  const s={rapid_builder:0,systems_operator:0,experimental_hacker:0,vision_architect:0,product_strategist:0,growth_hunter:0};
  if(ans.decision_speed==='fast'){s.rapid_builder+=2;s.growth_hunter+=1;}
  else if(ans.decision_speed==='deliberate'){s.systems_operator+=2;s.vision_architect+=1;}
  if(ans.risk_tolerance==='high'){s.experimental_hacker+=2;s.rapid_builder+=1;}
  else if(ans.risk_tolerance==='low'){s.systems_operator+=2;}
  if(ans.communication_style==='async'){s.vision_architect+=1;s.systems_operator+=1;}
  else if(ans.communication_style==='sync'){s.rapid_builder+=1;s.growth_hunter+=1;}
  if(ans.execution_style==='sprint'){s.rapid_builder+=1;s.growth_hunter+=1;}
  else if(ans.execution_style==='steady'){s.systems_operator+=2;}
  if(ans.ambition_level==='high'){s.vision_architect+=1;s.rapid_builder+=1;}
  if(ans.leadership_style==='coaching'){s.vision_architect+=1;s.product_strategist+=1;}
  else if(ans.leadership_style==='delegating'){s.systems_operator+=1;}
  return Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
}

function scoreDimensions(ans){
  return{
    'Decision Velocity':ans.decision_speed==='fast'?88:ans.decision_speed==='moderate'?62:40,
    'Risk Tolerance':ans.risk_tolerance==='high'?85:ans.risk_tolerance==='moderate'?60:38,
    'Communication':ans.communication_style==='async'?75:ans.communication_style==='balanced'?70:65,
    'Execution Pace':ans.execution_style==='sprint'?82:ans.execution_style==='steady'?68:72,
    'Vision Alignment':ans.ambition_level==='high'?88:ans.ambition_level==='moderate'?65:50,
    'Conflict Style':ans.conflict_approach==='collaborative'?80:ans.conflict_approach==='compromising'?65:55,
  };
}

function render(){
  const q=questions[current];
  document.getElementById('q-num').textContent=`Question ${current+1}`;
  document.getElementById('q-text').textContent=q.text;
  const pct=Math.round(((current+1)/questions.length)*100);
  document.getElementById('q-counter').textContent=`Question ${current+1} of ${questions.length}`;
  document.getElementById('q-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('btn-prev').style.display=current>0?'block':'none';
  document.getElementById('btn-next').textContent=current===questions.length-1?'See My Results →':'Next →';
  const opts=document.getElementById('q-options');
  opts.innerHTML=q.opts.map(o=>`
    <label class="opt${answers[q.id]===o.val?' selected':''}" onclick="selectOpt(this,'${q.id}','${o.val}')">
      <div class="opt-radio">${answers[q.id]===o.val?'<span style="width:7px;height:7px;border-radius:50%;background:#fff;display:block"></span>':''}</div>
      <div class="opt-body"><h4>${o.h}</h4><p>${o.p}</p></div>
    </label>`).join('');
  document.getElementById('btn-next').disabled=!answers[q.id];
}

function selectOpt(el,id,val){
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('.opt-radio').innerHTML='<span style="width:7px;height:7px;border-radius:50%;background:#fff;display:block"></span>';
  answers[id]=val;
  document.getElementById('btn-next').disabled=false;
}

function nextQ(){
  if(!answers[questions[current].id])return;
  if(current<questions.length-1){current++;render();}
  else showResults();
}

function prevQ(){if(current>0){current--;render();}}

function showResults(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('loading').style.display='block';
  const profile=JSON.parse(localStorage.getItem('founderProfile')||'{}');
  const merged={...profile,...answers};
  localStorage.setItem('founderProfile',JSON.stringify(merged));
  setTimeout(async()=>{
    let archetype,dims;
    try{
      const res=await fetch('/api/assessment/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:merged.name||'Founder',...merged})});
      const data=await res.json();
      archetype=data.archetype;
      dims=data.dimensions;
    }catch{
      archetype=classify(answers);
      const rawDims=scoreDimensions(answers);
      dims={};
      Object.entries(rawDims).forEach(([k,v])=>{dims[k.toLowerCase().replace(/ /g,'_')]=v;});
    }
    document.getElementById('loading').style.display='none';
    renderResults(archetype,dims,merged.name||'Founder');
  },1800);
}

function renderResults(archetype,dims,name){
  const arch=archetypes[archetype]||{name:archetype,emoji:'🧠',desc:''};
  const dimLabels={'decision_velocity':'Decision Velocity','risk_tolerance':'Risk Tolerance','communication':'Communication','execution_pace':'Execution Pace','vision_alignment':'Vision Alignment','conflict_style':'Conflict Style'};
  const overallScore=Math.round(Object.values(dims).reduce((a,b)=>a+b,0)/Object.values(dims).length);
  const circumference=2*Math.PI*54;
  const offset=circumference-(overallScore/100)*circumference;
  const strengths=['Strong signal clarity on decision patterns','Clear communication preference identified','Execution archetype determined','Risk posture well-defined'];
  const el=document.getElementById('results');
  el.innerHTML=`
    <div class="results-hero">
      <div class="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140">
          <circle cx="70" cy="70" r="54" fill="none" stroke="#1e1e30" stroke-width="8"/>
          <circle cx="70" cy="70" r="54" fill="none" stroke="url(#grad)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"/>
          <defs><linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#6366f1"/><stop offset="100%" stop-color="#a855f7"/></linearGradient></defs>
        </svg>
        <div class="score-ring-num"><span>${overallScore}</span><span>Score</span></div>
      </div>
      <div class="archetype-pill">${arch.emoji} ${arch.name}</div>
      <h2>${name}, you're a ${arch.name}</h2>
      <p>${arch.desc}</p>
    </div>
    <div class="results-grid">
      <div class="result-card">
        <h3>Dimension Scores</h3>
        ${Object.entries(dims).map(([k,v])=>`
          <div class="dim-row">
            <span class="dim-row-label">${dimLabels[k]||k}</span>
            <div class="dim-track"><div class="dim-fill" style="width:${v}%"></div></div>
            <span class="dim-score">${v}</span>
          </div>`).join('')}
      </div>
      <div class="result-card">
        <h3>Profile Signals</h3>
        <ul class="strengths-list">
          ${strengths.map(s=>`<li>${s}</li>`).join('')}
        </ul>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-retry" onclick="location.reload()">Retake Assessment</button>
      <button class="btn-dash" onclick="window.location.href='/dashboard.html'">Run Compatibility Analysis →</button>
    </div>`;
  el.style.display='block';
}

render();
</script>
</body>
</html>
