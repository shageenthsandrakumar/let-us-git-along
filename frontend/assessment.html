<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>FounderFit — Behavioral Assessment</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{--bg:#08080c;--surface:#0f0f14;--card:#13131a;--elevated:#1a1a24;--border:#1e1e2a;--blue:#4f7cff;--purple:#8b5cf6;--cyan:#06b6d4;--emerald:#10b981;--amber:#f59e0b;--rose:#f43f5e;--text:#f0f0f4;--muted:#8a8a9a;--faint:#5a5a6a}
  *{margin:0;padding:0;box-sizing:border-box}
  body{font-family:'Inter',system-ui,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
  a{text-decoration:none;color:inherit}
  nav{padding:1.25rem 2rem;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,8,12,.9);backdrop-filter:blur(12px);z-index:10}
  .logo{font-weight:600;font-size:1.1rem;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .nav-back{color:var(--muted);font-size:.875rem;transition:color .2s}
  .nav-back:hover{color:var(--text)}
  .main{max-width:680px;margin:0 auto;padding:2.5rem 2rem 8rem}
  /* PROGRESS */
  .prog-wrap{margin-bottom:2.5rem}
  .prog-info{display:flex;justify-content:space-between;margin-bottom:.625rem;font-size:.8rem;color:var(--muted)}
  .prog-track{height:3px;background:var(--border);border-radius:9999px;overflow:hidden}
  .prog-fill{height:100%;background:linear-gradient(90deg,var(--blue),var(--purple));border-radius:9999px;transition:width .4s ease}
  /* DIMENSION LABEL */
  .dim-label{display:inline-flex;align-items:center;gap:.4rem;padding:.25rem .75rem;border-radius:9999px;font-size:.7rem;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-bottom:1rem;border:1px solid}
  /* QUESTION CARD */
  .q-card{background:var(--card);border:1px solid var(--border);border-radius:1.25rem;padding:2.25rem;margin-bottom:1.25rem}
  .q-num{font-size:.72rem;font-weight:600;text-transform:uppercase;letter-spacing:.1em;color:var(--blue);margin-bottom:.75rem}
  .q-text{font-size:1.1rem;font-weight:600;line-height:1.5;margin-bottom:1.75rem}
  .opts{display:flex;flex-direction:column;gap:.5rem}
  .opt{display:flex;align-items:flex-start;gap:.875rem;padding:.875rem 1.125rem;border:1.5px solid var(--border);border-radius:.75rem;cursor:pointer;transition:all .2s}
  .opt:hover,.opt:active{border-color:rgba(79,124,255,.5);background:rgba(79,124,255,.04)}
  .opt.selected{border-color:var(--blue);background:rgba(79,124,255,.09)}
  .opt-radio{width:18px;height:18px;border-radius:50%;border:2px solid var(--border);flex-shrink:0;margin-top:.15rem;transition:all .2s;display:flex;align-items:center;justify-content:center}
  .opt.selected .opt-radio{border-color:var(--blue);background:var(--blue)}
  .opt.selected .opt-radio::after{content:'';width:6px;height:6px;border-radius:50%;background:#fff;display:block}
  .opt-body h4{font-size:.9rem;font-weight:600;margin-bottom:.2rem}
  .opt-body p{font-size:.78rem;color:var(--muted);line-height:1.5}
  /* ACTIONS */
  .q-actions{display:flex;gap:.75rem}
  .btn-prev{padding:.875rem 1.5rem;border:1px solid var(--border);background:none;color:var(--muted);border-radius:.625rem;font-size:.875rem;cursor:pointer;transition:all .2s;font-family:inherit}
  .btn-prev:hover{border-color:var(--blue);color:var(--text)}
  .btn-next{flex:1;padding:.875rem;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:.625rem;font-size:.95rem;font-weight:600;cursor:pointer;transition:opacity .2s;font-family:inherit;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
  .btn-next:disabled{opacity:.4;cursor:not-allowed}
  .btn-hint{font-size:.72rem;color:var(--faint);text-align:center;margin-top:.5rem;min-height:1rem;transition:opacity .2s}
  @media(max-width:680px){
    .main{padding:2rem 1.25rem 9rem}
    .q-card{padding:1.5rem}
    .q-actions{position:sticky;bottom:0;background:var(--bg);padding:.75rem 0;margin-bottom:0}
  }
  /* LOADING */
  .loading{display:none;text-align:center;padding:4rem 2rem}
  .spinner{width:48px;height:48px;border:3px solid var(--border);border-top-color:var(--blue);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1.5rem}
  @keyframes spin{to{transform:rotate(360deg)}}
  .loading h3{font-size:1.1rem;font-weight:600;margin-bottom:.5rem}
  .loading p{color:var(--muted);font-size:.875rem}
  /* RESULTS */
  #results{display:none}
  .results-hero{text-align:center;padding:2rem 0 2.5rem}
  .score-ring{width:140px;height:140px;margin:0 auto 1.5rem;position:relative}
  .score-ring-num{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .score-ring-num .score-big{font-size:2.5rem;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--purple));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .score-ring-num .score-sub{font-size:.65rem;color:var(--muted);text-transform:uppercase;letter-spacing:.05em}
  .arch-pill{display:inline-block;padding:.5rem 1.25rem;background:rgba(79,124,255,.12);border:1px solid rgba(79,124,255,.3);border-radius:9999px;font-weight:600;font-size:.875rem;color:#a5b4fc;margin-bottom:1rem}
  .results-hero h2{font-size:1.6rem;font-weight:700;margin-bottom:.75rem}
  .results-hero .arch-desc{color:var(--muted);max-width:500px;margin:0 auto;line-height:1.7;font-size:.9rem}
  .r-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;margin-bottom:1rem}
  @media(max-width:560px){.r-grid{grid-template-columns:1fr}}
  .r-card{background:var(--card);border:1px solid var(--border);border-radius:1rem;padding:1.5rem}
  .r-card-title{font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:1.25rem}
  .dim-row{display:flex;align-items:center;gap:.75rem;margin-bottom:.75rem}
  .dim-row:last-child{margin-bottom:0}
  .dim-row-label{font-size:.75rem;color:var(--muted);width:120px;flex-shrink:0}
  .dim-track{flex:1;height:5px;background:var(--border);border-radius:9999px;overflow:hidden}
  .dim-fill{height:100%;border-radius:9999px;transition:width .9s ease}
  .dim-val{font-size:.75rem;font-weight:700;width:26px;text-align:right}
  .signals{list-style:none}
  .signals li{font-size:.82rem;color:var(--muted);padding:.5rem 0;border-bottom:1px solid var(--border);display:flex;gap:.5rem;line-height:1.5;align-items:flex-start}
  .signals li:last-child{border-bottom:none}
  .signals li::before{content:'·';color:var(--blue);flex-shrink:0;font-weight:700}
  .result-actions{display:flex;gap:.75rem;margin-top:1.25rem}
  .btn-dash{flex:1;padding:.875rem;background:linear-gradient(135deg,var(--blue),var(--purple));color:#fff;border:none;border-radius:.625rem;font-size:.9rem;font-weight:600;cursor:pointer;font-family:inherit}
  .btn-retry{padding:.875rem 1.5rem;border:1px solid var(--border);color:var(--muted);background:none;border-radius:.625rem;font-size:.875rem;cursor:pointer;font-family:inherit;transition:all .2s}
  .btn-retry:hover{border-color:var(--blue);color:var(--text)}
  /* NARRATIVE */
  .narrative-card{background:var(--elevated);border:1px solid var(--border);border-radius:1rem;padding:1.75rem;margin-bottom:1.25rem}
  .narrative-label{font-size:.65rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:1rem;display:flex;align-items:center;gap:.4rem}
  .narrative-label::before{content:'';width:5px;height:5px;border-radius:50%;background:var(--purple);display:inline-block}
  .narrative-text{font-size:.875rem;color:var(--text);line-height:1.85}
  .narrative-text p{margin-bottom:.875rem}
  .narrative-text p:last-child{margin-bottom:0;color:#a5b4fc;font-style:italic}

  /* SYNTHESIS */
  .why-toggle{background:none;border:none;color:var(--muted);font-size:.8rem;cursor:pointer;font-family:inherit;padding:.5rem 0;display:flex;align-items:center;gap:.35rem;transition:color .2s;margin-bottom:.5rem}
  .why-toggle:hover{color:var(--text)}
  .why-toggle .toggle-arrow{transition:transform .2s;font-size:.65rem}
  .why-toggle.open .toggle-arrow{transform:rotate(90deg)}
  .why-breakdown{display:none;background:var(--elevated);border:1px solid var(--border);border-radius:.75rem;padding:1.25rem;margin-bottom:1rem}
  .why-breakdown.visible{display:block}
  .signal-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:.5rem;margin-bottom:1rem}
  @media(max-width:560px){.signal-grid{grid-template-columns:1fr}}
  .signal-cell{background:var(--card);border:1px solid var(--border);border-radius:.5rem;padding:.75rem}
  .signal-cell-label{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.3rem}
  .signal-cell-text{font-size:.75rem;color:var(--muted);line-height:1.5}
  .signal-na .signal-cell-text{opacity:.4;font-style:italic}
  .breakdown-section{margin-bottom:.875rem}
  .breakdown-label{font-size:.63rem;font-weight:700;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);margin-bottom:.375rem}
  .breakdown-text{font-size:.82rem;color:var(--text);line-height:1.7}
</style>
</head>
<body>
<nav>
  <div class="logo">FounderFit</div>
  <a href="/onboarding.html" class="nav-back">Back to profile</a>
</nav>

<div class="main">

  <div id="quiz-section">
    <div class="prog-wrap">
      <div class="prog-info"><span id="q-counter">Question 1 of 10</span><span id="q-pct">10%</span></div>
      <div class="prog-track"><div class="prog-fill" id="prog-fill" style="width:10%"></div></div>
    </div>
    <div class="q-card" id="q-card">
      <div class="q-num" id="q-num">Question 1</div>
      <div id="q-dim-label"></div>
      <div class="q-text" id="q-text"></div>
      <div class="opts" id="q-opts"></div>
    </div>
    <div class="q-actions">
      <button class="btn-prev" id="btn-prev" onclick="prevQ()" style="display:none">Back</button>
      <button class="btn-next" id="btn-next" onclick="nextQ()" disabled>Next</button>
    </div>
    <div class="btn-hint" id="btn-hint">Select an answer to continue</div>
  </div>

  <div class="loading" id="loading">
    <div class="spinner"></div>
    <h3>Analyzing your profile…</h3>
    <p>Classifying your founder archetype across 10 dimensions</p>
  </div>

  <div id="results"></div>
</div>

<script>
const DIM_COLORS={
  'Execution Style':'#4f7cff','Communication Cadence':'#06b6d4','Decision-Making':'#8b5cf6',
  'Risk Posture':'#f43f5e','Conflict Resolution':'#f59e0b','Tooling Affinity':'#a78bfa',
  'Domain Coverage':'#10b981','Time & Energy':'#e879f9','Ownership Philosophy':'#34d399','GTM Orientation':'#fb923c',
  'Network Proximity':'#2dd4bf'
};

const questions=[
  {id:'execution_style',dim:'Execution Style',text:'You have a hard deadline in 3 days and the feature isn\'t ready. You:',opts:[
    {val:'fast',h:'Ship the 80% version now',p:'Get it in front of users. Imperfect and live beats perfect and dead.'},
    {val:'moderate',h:'Cut scope to hit quality bar',p:'Ship a smaller but solid version. No half-finished things with your name on them.'},
    {val:'deliberate',h:'Push back on the deadline',p:'Shipping broken erodes trust. Negotiate a timeline that lets you do it right.'}
  ]},
  {id:'communication_style',dim:'Communication Cadence',text:'Your ideal working relationship with a co-founder looks like:',opts:[
    {val:'async',h:'Async-first',p:'Slack, Notion, PRs. You communicate in writing and protect deep work time.'},
    {val:'balanced',h:'Situational',p:'Async for updates, sync for hard decisions. You read the moment.'},
    {val:'sync',h:'High-touch sync',p:'Daily check-ins, shared context in real time. You need to be in the room.'}
  ]},
  {id:'decision_speed',dim:'Decision-Making',text:'A major strategic decision lands on your plate with 60% of the data you\'d want. You:',opts:[
    {val:'fast',h:'Decide now and adjust',p:'Speed is a competitive advantage. You can course-correct. Waiting has a cost.'},
    {val:'moderate',h:'Gather a bit more signal',p:'Talk to 2-3 people, check one more dataset, then commit with confidence.'},
    {val:'deliberate',h:'Map the decision tree first',p:'You need to understand the second-order consequences before you move.'}
  ]},
  {id:'risk_tolerance',dim:'Risk Posture',text:'Your co-founder wants to bet 60% of your runway on an unproven channel. You:',opts:[
    {val:'high',h:"Let's run the experiment",p:'Asymmetric upside. You calculate the bet, define the kill criteria, and go.'},
    {val:'moderate',h:'Validate with 20% first',p:'Prove the unit economics at small scale before you double down.'},
    {val:'low',h:'Push for a diversified approach',p:'Concentration risk is real. You\'d rather spread bets and protect the core.'}
  ]},
  {id:'conflict_approach',dim:'Conflict Resolution',text:'You and your co-founder have a genuine disagreement on product direction. You:',opts:[
    {val:'competing',h:'Push your case hard',p:'You back convictions with evidence and argue until one view wins on merit.'},
    {val:'collaborative',h:'Treat it as a problem to solve together',p:'The best answer matters more than whose answer it is.'},
    {val:'compromising',h:'Find the middle ground fast',p:'A good-enough decision now beats a perfect one in three weeks.'}
  ]},
  {id:'tooling_affinity',dim:'Tooling Affinity',text:'Your default tool instinct when starting something new is:',opts:[
    {val:'heavy',h:'Set up the full stack immediately',p:'Proper tooling from day one. Technical debt in tooling compounds fast.'},
    {val:'pragmatic',h:'Use what works, upgrade later',p:'Start with the obvious tool, migrate when you outgrow it. No premature optimization.'},
    {val:'minimal',h:'Avoid tools until you feel the pain',p:'Every tool is overhead. You add it only when the problem is undeniable.'}
  ]},
  {id:'domain_expertise',dim:'Domain Coverage',text:'When entering a new market, your instinct is:',opts:[
    {val:'generalist',h:'Learn fast from first principles',p:'You can reason your way into any domain. Speed of learning is the skill.'},
    {val:'specialist',h:'Go deep before going broad',p:'Surface-level knowledge is dangerous. You want to understand the domain better than the incumbents.'},
    {val:'collaborative',h:'Partner with domain experts',p:'Your edge is execution and distribution. You hire or partner for domain knowledge.'}
  ]},
  {id:'time_commitment',dim:'Time & Energy',text:'Your natural work pattern over a quarter looks like:',opts:[
    {val:'sprint',h:'Intense sprints with recovery',p:'2-3 week all-out bursts, then consolidation. You live in the peaks.'},
    {val:'steady',h:'Consistent daily output',p:'Same cadence every day. No heroics, no crashes. Compounding over volatility.'},
    {val:'flexible',h:'Adapts to what the moment needs',p:'Furious when it matters, measured when it doesn\'t. Context-driven.'}
  ]},
  {id:'ownership_philosophy',dim:'Ownership Philosophy',text:'On equity and ownership, you believe:',opts:[
    {val:'equal',h:'Equal split, equal commitment',p:'50/50 signals mutual trust and prevents resentment. Negotiate roles, not percentages.'},
    {val:'merit',h:'Split should reflect contribution',p:'Different roles, different risk, different value. Equity should reflect reality.'},
    {val:'flexible',h:'Start equal, adjust over time',p:'Begin with a fair split and build in mechanisms to recalibrate as roles evolve.'}
  ]},
  {id:'gtm_orientation',dim:'GTM Orientation',text:'Your instinct on how to grow the business is:',opts:[
    {val:'product_led',h:'Product-led growth',p:'Build something so good it sells itself. Free tier, viral loops, self-serve.'},
    {val:'sales_led',h:'Sales-led growth',p:'Relationships and conversations close deals. You get in the room and sell.'},
    {val:'community_led',h:'Community-led growth',p:'Build the audience first. Trust compounds into distribution and revenue.'}
  ]}
];

let current=0;
const answers={};

const archetypes={
  rapid_builder:{name:'Rapid Builder',emoji:'🚀',desc:'You ship fast, iterate aggressively, and treat tech debt as fuel. Your superpower is momentum — getting something in users\' hands before others finish planning. You thrive in ambiguity and find slow decision-making physically painful.'},
  systems_operator:{name:'Systems Operator',emoji:'🏗️',desc:'You build infrastructure others stand on. Methodical, scalability-focused, reliability-obsessed — you think about 10M users before you have 100. Your superpower is designing machines that outlast you.'},
  experimental_hacker:{name:'Experimental Hacker',emoji:'🔬',desc:'You explore widely, prototype fast, hold low attachment to any single approach. Your superpower is killing ideas quickly and finding signal in noise. You thrive in research-heavy, uncertainty-rich environments.'},
  vision_architect:{name:'Vision Architect',emoji:'🗺️',desc:'You see ten moves ahead and design backward. Documentation-heavy, strategic, long-horizon — your superpower is building shared understanding across a team. You\'re at your best in platform companies where architecture is the moat.'},
  product_strategist:{name:'Product Strategist',emoji:'📦',desc:'You\'re obsessed with the customer and make pragmatic trade-offs to deliver value fast. Feature-driven and outcome-focused, your superpower is knowing which 20% of features drive 80% of adoption.'},
  growth_hunter:{name:'Growth Hunter',emoji:'📈',desc:'You run experiments on everything and double down on what moves the number. Metrics-obsessed and conversion-focused, your superpower is building compounding loops where each win makes the next win cheaper.'}
};

function classify(ans){
  const s={rapid_builder:0,systems_operator:0,experimental_hacker:0,vision_architect:0,product_strategist:0,growth_hunter:0};
  if(ans.execution_style==='fast'){s.rapid_builder+=2;s.growth_hunter+=1;}
  else if(ans.execution_style==='deliberate'){s.systems_operator+=2;s.vision_architect+=1;}
  if(ans.risk_tolerance==='high'){s.experimental_hacker+=2;s.rapid_builder+=1;}
  else if(ans.risk_tolerance==='low'){s.systems_operator+=2;}
  if(ans.communication_style==='async'){s.vision_architect+=1;s.systems_operator+=1;}
  else if(ans.communication_style==='sync'){s.rapid_builder+=1;s.growth_hunter+=1;}
  if(ans.time_commitment==='sprint'){s.rapid_builder+=1;s.growth_hunter+=1;}
  else if(ans.time_commitment==='steady'){s.systems_operator+=2;}
  if(ans.gtm_orientation==='product_led'){s.product_strategist+=2;s.growth_hunter+=1;}
  else if(ans.gtm_orientation==='sales_led'){s.growth_hunter+=2;}
  if(ans.domain_expertise==='specialist'){s.systems_operator+=1;s.vision_architect+=1;}
  else if(ans.domain_expertise==='generalist'){s.experimental_hacker+=1;s.rapid_builder+=1;}
  if(ans.decision_speed==='fast'){s.rapid_builder+=1;s.growth_hunter+=1;}
  else if(ans.decision_speed==='deliberate'){s.vision_architect+=1;s.systems_operator+=1;}
  if(ans.tooling_affinity==='heavy'){s.systems_operator+=2;}
  else if(ans.tooling_affinity==='minimal'){s.experimental_hacker+=1;s.rapid_builder+=1;}
  return Object.entries(s).sort((a,b)=>b[1]-a[1])[0][0];
}

function scoreDims(ans){
  const sp=(v,high,low,mid=null)=>v===high?85+Math.floor(Math.random()*10):v===low?35+Math.floor(Math.random()*15):65+Math.floor(Math.random()*15);
  return{
    'Execution Style':sp(ans.execution_style,'fast','deliberate'),
    'Communication Cadence':sp(ans.communication_style,'async','sync'),
    'Decision-Making':sp(ans.decision_speed,'fast','deliberate'),
    'Risk Posture':sp(ans.risk_tolerance,'high','low'),
    'Conflict Resolution':ans.conflict_approach==='collaborative'?82+Math.floor(Math.random()*10):ans.conflict_approach==='compromising'?65+Math.floor(Math.random()*10):50+Math.floor(Math.random()*15),
    'Tooling Affinity':ans.tooling_affinity==='pragmatic'?75+Math.floor(Math.random()*15):ans.tooling_affinity==='heavy'?60+Math.floor(Math.random()*15):70+Math.floor(Math.random()*15),
    'Domain Coverage':ans.domain_expertise==='specialist'?80+Math.floor(Math.random()*15):65+Math.floor(Math.random()*20),
    'Time & Energy':ans.time_commitment==='sprint'?85+Math.floor(Math.random()*10):ans.time_commitment==='flexible'?45+Math.floor(Math.random()*15):72+Math.floor(Math.random()*12),
    'Ownership Philosophy':ans.ownership_philosophy==='flexible'?80+Math.floor(Math.random()*12):70+Math.floor(Math.random()*15),
    'GTM Orientation':ans.gtm_orientation==='product_led'?78+Math.floor(Math.random()*12):70+Math.floor(Math.random()*15),
  };
}

function render(){
  const q=questions[current];
  const pct=Math.round(((current+1)/questions.length)*100);
  document.getElementById('q-num').textContent=`Question ${current+1}`;
  document.getElementById('q-counter').textContent=`Question ${current+1} of ${questions.length}`;
  document.getElementById('q-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('btn-prev').style.display=current>0?'block':'none';
  document.getElementById('btn-next').textContent=current===questions.length-1?'See My Results':'Next';
  const color=DIM_COLORS[q.dim]||'#4f7cff';
  document.getElementById('q-dim-label').innerHTML=`<span class="dim-label" style="color:${color};border-color:${color}30;background:${color}12">${q.dim}</span>`;
  document.getElementById('q-text').textContent=q.text;
  document.getElementById('q-opts').innerHTML=q.opts.map(o=>`
    <label class="opt${answers[q.id]===o.val?' selected':''}" onclick="selectOpt(this,'${q.id}','${o.val}')">
      <div class="opt-radio">${answers[q.id]===o.val?'<span style="width:6px;height:6px;border-radius:50%;background:#fff;display:block"></span>':''}</div>
      <div class="opt-body"><h4>${o.h}</h4><p>${o.p}</p></div>
    </label>`).join('');
  const hasAnswer = !!answers[q.id];
  document.getElementById('btn-next').disabled = !hasAnswer;
  const hint = document.getElementById('btn-hint');
  if(hint) hint.style.opacity = hasAnswer ? '0' : '1';
}

function selectOpt(el,id,val){
  document.querySelectorAll('.opt').forEach(o=>o.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('.opt-radio').innerHTML='<span style="width:6px;height:6px;border-radius:50%;background:#fff;display:block"></span>';
  answers[id]=val;
  document.getElementById('btn-next').disabled=false;
  const hint = document.getElementById('btn-hint');
  if(hint) hint.style.opacity = '0';
}

function nextQ(){
  if(!answers[questions[current].id])return;
  if(current<questions.length-1){current++;render();}
  else showResults();
}
function prevQ(){if(current>0){current--;render();}}

function showResults(){
  document.getElementById('quiz-section').style.display='none';
  document.getElementById('loading').style.display='block';
  let profile={};try{profile=JSON.parse(localStorage.getItem('founderProfile')||'{}');}catch(_){}
  const merged={...profile,...answers};
  const loadingP = document.querySelector('.loading p');
  if(loadingP && (merged.github_username || merged.resume_text || merged.resume_pdf_text)){
    loadingP.textContent='Running GitHub and LinkedIn analysis...';
  }
  localStorage.setItem('founderProfile',JSON.stringify(merged));
  const github_username = merged.github_username || null;
  const payload = {name:merged.name||'Founder',...merged};
  if(github_username) payload.github_username = github_username;
  if(merged.resume_text) payload.resume_text = merged.resume_text;
  if(merged.resume_pdf_text) payload.resume_pdf_text = merged.resume_pdf_text;
  setTimeout(async()=>{
    let archetype,dims,synthesis=null;
    try{
      const controller=new AbortController();
      const timer=setTimeout(()=>controller.abort(),180000); // 3-minute hard timeout
      const res=await fetch('/api/assessment/submit',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload),signal:controller.signal});
      clearTimeout(timer);
      if(!res.ok)throw new Error(`API error ${res.status}`);
      const data=await res.json();
      archetype=data.archetype;
      dims=data.dimensions;
      synthesis=data.synthesis||null;
    }catch(e){
      console.error('Assessment API failed, falling back to local scoring:', e);
      archetype=classify(answers);
      dims=scoreDims(answers);
    }
    document.getElementById('loading').style.display='none';
    let saved2={};try{saved2=JSON.parse(localStorage.getItem('founderProfile')||'{}');}catch(_){}
    saved2.archetype=archetype;
    localStorage.setItem('founderProfile',JSON.stringify(saved2));
    renderResults(archetype,dims,merged.name||'Founder',synthesis);
  },2000);
}

function renderResults(archetype,dims,name,synthesis=null){
  const narrative = synthesis&&synthesis.narrative ? synthesis.narrative : null;
  const arch=archetypes[archetype]||{name:archetype,emoji:'🧠',desc:''};
  const dimEntries=typeof dims==='object'&&dims!==null&&!Array.isArray(dims)?Object.entries(dims):Object.entries(scoreDims(answers));
  const overallScore=dimEntries.length?Math.round(dimEntries.reduce((s,[,v])=>s+(typeof v==='object'?v.score??60:v??60),0)/dimEntries.length):60;
  const circ=2*Math.PI*54;
  const offset=circ-(overallScore/100)*circ;
  const signals=['Decision-making pattern clearly identified','Communication preference well-defined','Risk posture signal captured','Tooling philosophy assessed','GTM orientation established','Ownership philosophy documented'];
  const narrativeHtml = narrative ? `<div class="narrative-card"><div class="narrative-label">FounderFit reads you</div><div class="narrative-text">${narrative.split('\n\n').map(p=>p.trim()).filter(Boolean).map(p=>{const el=document.createElement('p');el.textContent=p;return el.outerHTML;}).join('')}</div></div>` : '';
  document.getElementById('results').innerHTML=`
    ${narrativeHtml}
    <div class="results-hero">
      <div class="score-ring">
        <svg width="140" height="140" viewBox="0 0 140 140"><circle cx="70" cy="70" r="54" fill="none" stroke="#1e1e2a" stroke-width="8"/><circle cx="70" cy="70" r="54" fill="none" stroke="url(#rg)" stroke-width="8" stroke-linecap="round" stroke-dasharray="${circ}" stroke-dashoffset="${offset}" transform="rotate(-90 70 70)"/><defs><linearGradient id="rg" x1="0%" y1="0%" x2="100%" y2="0%"><stop offset="0%" stop-color="#4f7cff"/><stop offset="100%" stop-color="#8b5cf6"/></linearGradient></defs></svg>
        <div class="score-ring-num"><span class="score-big">${overallScore}</span><span class="score-sub">Score</span></div>
      </div>
      <div class="arch-pill">${arch.emoji} ${arch.name}</div>
      <h2>${name}, you're a ${arch.name}</h2>
      <p class="arch-desc">${arch.desc}</p>
    </div>
    <div class="r-grid">
      <div class="r-card">
        <div class="r-card-title">11-Dimension Profile</div>
        ${dimEntries.map(([k,v])=>{const score=typeof v==='object'?v.score??v:v;const color=DIM_COLORS[k]||'#4f7cff';return`<div class="dim-row"><span class="dim-row-label">${k}</span><div class="dim-track"><div class="dim-fill" style="width:${score}%;background:${color}"></div></div><span class="dim-val">${score}</span></div>`;}).join('')}
      </div>
      <div class="r-card">
        <div class="r-card-title">Profile Signals</div>
        <ul class="signals">${signals.map(s=>`<li>${s}</li>`).join('')}</ul>
      </div>
    </div>
    ${synthesis ? `<div style="margin-top:-.25rem;margin-bottom:1rem">
      <button class="why-toggle" id="why-btn" onclick="toggleWhy()">
        <span class="toggle-arrow">&#9654;</span> Why this archetype?
      </button>
      <div class="why-breakdown" id="why-breakdown">
        <div class="signal-grid">
          <div class="signal-cell${synthesis.questionnaire_signal?'':' signal-na'}">
            <div class="signal-cell-label">Questionnaire</div>
            <div class="signal-cell-text">${synthesis.questionnaire_signal||'Assessed'}</div>
          </div>
          <div class="signal-cell${synthesis.github_signal?'':' signal-na'}">
            <div class="signal-cell-label">GitHub Signal</div>
            <div class="signal-cell-text">${synthesis.github_signal||'Not provided'}</div>
          </div>
          <div class="signal-cell${synthesis.linkedin_signal?'':' signal-na'}">
            <div class="signal-cell-label">LinkedIn Signal</div>
            <div class="signal-cell-text">${synthesis.linkedin_signal||'Not provided'}</div>
          </div>
        </div>
        ${synthesis.emergent_insight?`<div class="breakdown-section"><div class="breakdown-label">Emergent Insight</div><div class="breakdown-text">${synthesis.emergent_insight}</div></div>`:''}
        ${synthesis.reasoning?`<div class="breakdown-section"><div class="breakdown-label">Reasoning</div><div class="breakdown-text">${synthesis.reasoning}</div></div>`:''}
        ${synthesis.partnership_note?`<div class="breakdown-section"><div class="breakdown-label">Partnership Note</div><div class="breakdown-text">${synthesis.partnership_note}</div></div>`:''}
      </div>
    </div>` : ''}
    <div class="result-actions">
      <button class="btn-retry" onclick="location.reload()">Retake</button>
      <button class="btn-dash" onclick="window.location.href='/dashboard.html'">Run Compatibility Analysis</button>
    </div>`;
  document.getElementById('results').style.display='block';
}

function toggleWhy(){
  const btn=document.getElementById('why-btn');
  const bd=document.getElementById('why-breakdown');
  if(!btn||!bd)return;
  btn.classList.toggle('open');
  bd.classList.toggle('visible');
}

render();
</script>
<script src="mascot.js"></script>
</body>
</html>
