<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FounderFit — AI-Powered Founder Compatibility</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; background: #0a0a0f; color: #e2e8f0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { text-align: center; max-width: 640px; padding: 2rem; }
    h1 { font-size: 3rem; font-weight: 800; background: linear-gradient(135deg, #6366f1, #a855f7); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 1rem; }
    p { color: #94a3b8; font-size: 1.125rem; line-height: 1.7; margin-bottom: 2rem; }
    .badge { display: inline-block; padding: 0.375rem 0.875rem; background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3); border-radius: 9999px; font-size: 0.875rem; color: #818cf8; margin-bottom: 2rem; }
    .links { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
    a { padding: 0.75rem 1.5rem; border-radius: 0.5rem; text-decoration: none; font-weight: 600; transition: all 0.2s; }
    .primary { background: #6366f1; color: white; }
    .primary:hover { background: #4f46e5; }
    .secondary { border: 1px solid #334155; color: #94a3b8; }
    .secondary:hover { border-color: #6366f1; color: #e2e8f0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="badge">Multi-Agent AI Platform</div>
    <h1>FounderFit</h1>
    <p>Predict co-founder compatibility across six operational dimensions using a multi-agent AI system built with ag2 and FastAPI.</p>
    <div class="links">
      <a href="/onboarding.html" class="primary">Get Started</a>
      <a href="/docs" class="secondary">API Docs</a>
      <a href="/assessment.html" class="secondary">Assessment</a>
    </div>
  </div>
</body>
</html>
